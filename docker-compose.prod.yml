services:
  core-backend:
    environment:
      NODE_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS:-https://your-domain.com}
      UVICORN_WORKERS: ${CORE_UVICORN_WORKERS:-2}
      UVICORN_LOG_LEVEL: ${UVICORN_LOG_LEVEL:-info}

  realtime-service:
    environment:
      NODE_ENV: production
      SOCKET_IO_CORS_ORIGINS: ${SOCKET_IO_CORS_ORIGINS:-https://your-domain.com}
      UVICORN_WORKERS: ${REALTIME_UVICORN_WORKERS:-1}
      UVICORN_LOG_LEVEL: ${UVICORN_LOG_LEVEL:-info}

  worker-service:
    environment:
      NODE_ENV: production

  frontend-service:
    environment:
      NODE_ENV: production
