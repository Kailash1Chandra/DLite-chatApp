services:
  core-backend:
    build:
      context: ./core-backend
    environment:
      PORT: ${CORE_PORT:-4000}
      NODE_ENV: ${NODE_ENV:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      # Shared DB/auth config
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-}
      JWT_SECRET: ${JWT_SECRET:-}
      # Media
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-50}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-d-lite/media}
    ports:
      - "${CORE_PORT:-4000}:4000"
    restart: unless-stopped
    networks:
      - public
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4000/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  realtime-service:
    build:
      context: ./realtime-service
    environment:
      PORT: ${REALTIME_PORT:-4003}
      NODE_ENV: ${NODE_ENV:-production}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-}
      JWT_SECRET: ${JWT_SECRET:-}
    ports:
      - "${REALTIME_PORT:-4003}:4003"
    restart: unless-stopped
    networks:
      - public
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4003/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  worker-service:
    build:
      context: ./worker-service
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-300}
      BACKUP_BATCH_SIZE: ${BACKUP_BATCH_SIZE:-500}
      BACKUP_OUTPUT_DIR: /data
    volumes:
      - worker_data:/data
    restart: unless-stopped
    networks:
      - public

  frontend-service:
    build:
      context: ./frontend-service
      network: host
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://core-backend:4000}
        NEXT_PUBLIC_CHAT_SOCKET_URL: ${NEXT_PUBLIC_CHAT_SOCKET_URL:-http://realtime-service:4003}
        NEXT_PUBLIC_CALL_SOCKET_URL: ${NEXT_PUBLIC_CALL_SOCKET_URL:-http://realtime-service:4003}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_ICE_SERVERS_JSON: ${NEXT_PUBLIC_ICE_SERVERS_JSON:-[{"urls":["stun:stun.l.google.com:19302"]}]}
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "3000:3000"
    depends_on:
      core-backend:
        condition: service_healthy
      realtime-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - public

volumes:
  worker_data:

networks:
  public:
  

